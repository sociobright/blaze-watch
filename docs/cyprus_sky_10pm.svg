<svg viewBox="0 0 640 720" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Geneva, sans-serif">
  <defs>
    <radialGradient id="sky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1330"/>
      <stop offset="70%" stop-color="#080c22"/>
      <stop offset="100%" stop-color="#04050f"/>
    </radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowbig" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="640" height="720" fill="#04050f"/>

  <!-- Title -->
  <text x="320" y="30" text-anchor="middle" fill="#e9eeff" font-size="21" font-weight="bold">Cyprus night sky — 10:00 PM, ~9 July 2026</text>
  <text x="320" y="50" text-anchor="middle" fill="#93a0d4" font-size="13">Whole sky, as if lying back and looking straight up · center = zenith · edge = horizon</text>

  <!-- Sky disc -->
  <circle cx="320" cy="330" r="275" fill="url(#sky)" stroke="#5566a0" stroke-width="2"/>

  <!-- Altitude rings -->
  <circle cx="320" cy="330" r="183.3" fill="none" stroke="#28325a" stroke-width="1" stroke-dasharray="3 5"/>
  <circle cx="320" cy="330" r="91.7" fill="none" stroke="#28325a" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="320" y="151" text-anchor="middle" fill="#3c4a80" font-size="10">30° up</text>
  <text x="320" y="243" text-anchor="middle" fill="#3c4a80" font-size="10">60° up</text>

  <!-- Cardinal labels (E/W flipped because we look up) -->
  <text x="320" y="46" text-anchor="middle" fill="#ffd24a" font-size="17" font-weight="bold">N</text>
  <text x="320" y="622" text-anchor="middle" fill="#ffd24a" font-size="17" font-weight="bold">S</text>
  <text x="28" y="336" text-anchor="middle" fill="#ffd24a" font-size="17" font-weight="bold">E</text>
  <text x="612" y="336" text-anchor="middle" fill="#ffd24a" font-size="17" font-weight="bold">W</text>
  <text x="320" y="640" text-anchor="middle" fill="#8593c8" font-size="11" font-style="italic">Face south and tip your head back. E &amp; W look swapped vs a ground map — normal when looking up.</text>

  <!-- ===== Constellation lines ===== -->
  <!-- Big Dipper -->
  <path d="M417,190 L434,197 L430,222 L416,222 Z M416,222 L407,236 L399,247 L398,268"
        fill="none" stroke="#5a6aa0" stroke-width="1.6"/>
  <!-- Summer Triangle -->
  <path d="M246,306 L196,252 L166,378 Z" fill="none" stroke="#3f4d85" stroke-width="1.2" stroke-dasharray="2 4"/>
  <!-- Corona Borealis arc -->
  <path d="M357,339 L361,345 L358,353 L352,355 L348,356 L342,354 L338,345"
        fill="none" stroke="#9fb2ff" stroke-width="1.8"/>

  <!-- ===== Star-hop guide ===== -->
  <!-- Arc to Arcturus -->
  <path d="M398,268 Q443,318 417,364" fill="none" stroke="#ffcf5c" stroke-width="2" stroke-dasharray="6 5" opacity="0.9"/>
  <!-- Arcturus -> Izar -> Crown -->
  <path d="M417,364 L391,346 L358,353" fill="none" stroke="#ffcf5c" stroke-width="2" stroke-dasharray="6 5" opacity="0.9"/>
  <!-- Vega -> Crown -->
  <path d="M246,306 L358,353" fill="none" stroke="#ffcf5c" stroke-width="1.6" stroke-dasharray="4 6" opacity="0.7"/>

  <!-- ===== Stars ===== -->
  <!-- helper: bright stars with glow -->
  <g>
    <!-- Arcturus (orange, bright) -->
    <circle cx="417" cy="364" r="6" fill="#ffb27a" filter="url(#glowbig)"/>
    <text x="425" y="380" fill="#ffd9b8" font-size="13" font-weight="bold">Arcturus</text>
    <!-- Vega (blue-white, bright) -->
    <circle cx="246" cy="306" r="6" fill="#cfe0ff" filter="url(#glowbig)"/>
    <text x="200" y="300" fill="#dbe7ff" font-size="13" font-weight="bold" text-anchor="end">Vega</text>
    <!-- Deneb -->
    <circle cx="196" cy="252" r="4.3" fill="#eef3ff" filter="url(#glow)"/>
    <text x="188" y="247" fill="#c7d2f5" font-size="12" text-anchor="end">Deneb</text>
    <!-- Altair -->
    <circle cx="166" cy="378" r="4.6" fill="#eef3ff" filter="url(#glow)"/>
    <text x="158" y="383" fill="#c7d2f5" font-size="12" text-anchor="end">Altair</text>
    <!-- Antares (red, low south) -->
    <circle cx="320" cy="518" r="4.8" fill="#ff8f6b" filter="url(#glow)"/>
    <text x="320" y="538" fill="#ffc2ab" font-size="12" text-anchor="middle">Antares (Scorpius, low S)</text>
    <!-- Polaris -->
    <circle cx="320" cy="162" r="3.4" fill="#dfe7ff"/>
    <text x="320" y="180" fill="#9aa6d8" font-size="11" text-anchor="middle">Polaris</text>
  </g>

  <!-- Big Dipper stars -->
  <g fill="#dfe7ff">
    <circle cx="417" cy="190" r="3.4"/><circle cx="434" cy="197" r="3.4"/>
    <circle cx="430" cy="222" r="3.2"/><circle cx="416" cy="222" r="2.8"/>
    <circle cx="407" cy="236" r="3.2"/><circle cx="399" cy="247" r="3.2"/>
    <circle cx="398" cy="268" r="3.4"/>
  </g>
  <text x="446" y="205" fill="#9aa6d8" font-size="12">Big Dipper</text>
  <text x="360" y="285" fill="#9aa6d8" font-size="11" text-anchor="end">Alkaid</text>

  <!-- Izar (hop star) -->
  <circle cx="391" cy="346" r="2.8" fill="#dfe7ff"/>
  <text x="392" y="338" fill="#8895c8" font-size="10">Izar</text>

  <!-- Corona Borealis stars -->
  <g fill="#c6d3ff">
    <circle cx="361" cy="345" r="2.6"/>
    <circle cx="352" cy="355" r="2.4"/>
    <circle cx="348" cy="356" r="2.4"/>
    <circle cx="342" cy="354" r="2.6"/>
    <circle cx="357" cy="339" r="2.4"/>
    <circle cx="338" cy="345" r="2.4"/>
  </g>
  <!-- Alphecca (brightest in crown) -->
  <circle cx="358" cy="353" r="4" fill="#eaf0ff" filter="url(#glow)"/>
  <text x="372" y="345" fill="#dbe4ff" font-size="12" font-weight="bold">Alphecca</text>
  <text x="380" y="333" fill="#9aa6d8" font-size="11">Corona Borealis</text>

  <!-- T CrB marker -->
  <g filter="url(#glowbig)">
    <circle cx="347" cy="361" r="5.2" fill="#ffd24a"/>
    <circle cx="347" cy="361" r="2.4" fill="#ff5a4a"/>
  </g>
  <line x1="347" y1="361" x2="300" y2="420" stroke="#ffd24a" stroke-width="1"/>
  <text x="298" y="435" fill="#ffe08a" font-size="13" font-weight="bold" text-anchor="end">T CrB</text>
  <text x="298" y="451" fill="#c9b063" font-size="11" text-anchor="end">the "new star" appears here</text>

  <!-- Zenith crosshair -->
  <g stroke="#6b78ad" stroke-width="1">
    <line x1="313" y1="330" x2="327" y2="330"/>
    <line x1="320" y1="323" x2="320" y2="337"/>
  </g>
  <text x="320" y="318" fill="#8593c8" font-size="10" text-anchor="middle">zenith (straight up)</text>

  <!-- Star-hop labels -->
  <text x="452" y="322" fill="#e2c05a" font-size="11" font-weight="bold">arc to</text>
  <text x="452" y="335" fill="#e2c05a" font-size="11" font-weight="bold">Arcturus</text>

  <!-- Legend -->
  <g transform="translate(36,660)">
    <line x1="0" y1="6" x2="30" y2="6" stroke="#ffcf5c" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="38" y="10" fill="#c7d2f5" font-size="11">star-hop path</text>
    <circle cx="150" cy="6" r="4.6" fill="#ffd24a"/><circle cx="150" cy="6" r="2" fill="#ff5a4a"/>
    <text x="160" y="10" fill="#c7d2f5" font-size="11">T CrB (Blaze Star)</text>
    <circle cx="300" cy="6" r="4" fill="#eaf0ff"/>
    <text x="310" y="10" fill="#c7d2f5" font-size="11">bright guide star</text>
  </g>
  <text x="604" y="690" fill="#55608c" font-size="10" text-anchor="end">Positions computed for lat ~35°N, lon ~33°E</text>
</svg>
