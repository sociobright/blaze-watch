<svg viewBox="0 0 540 380" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Geneva, sans-serif">
  <defs>
    <radialGradient id="sky2" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1330"/>
      <stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <filter id="g2" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="540" height="380" fill="url(#sky2)"/>
  <text x="270" y="28" text-anchor="middle" fill="#e9eeff" font-size="17" font-weight="bold">Close-up: where T CrB will appear in the Northern Crown</text>

  <!-- direction arrows -->
  <g stroke="#7d8ac0" stroke-width="1.6" fill="#7d8ac0">
    <line x1="150" y1="300" x2="70" y2="340"/>
    <polygon points="70,340 84,330 82,344"/>
  </g>
  <text x="60" y="356" fill="#9aa6d8" font-size="12" text-anchor="start">toward Arcturus (lower / SW)</text>
  <g stroke="#7d8ac0" stroke-width="1.6" fill="#7d8ac0">
    <line x1="175" y1="115" x2="105" y2="70"/>
    <polygon points="105,70 120,74 112,86"/>
  </g>
  <text x="98" y="60" fill="#9aa6d8" font-size="12" text-anchor="start">toward Vega / zenith</text>

  <!-- Crown arc -->
  <path d="M175,120 L235,86 L295,90 L340,128 L352,178 L332,228 L285,258"
        fill="none" stroke="#9fb2ff" stroke-width="1.8"/>

  <!-- crown stars -->
  <g fill="#c6d3ff">
    <circle cx="175" cy="120" r="3"/>
    <circle cx="235" cy="86" r="3"/>
    <circle cx="340" cy="128" r="3"/>
    <circle cx="352" cy="178" r="3.4"/>
    <circle cx="285" cy="258" r="3"/>
  </g>
  <text x="168" y="112" fill="#8895c8" font-size="11" text-anchor="end">&#952;</text>
  <text x="235" y="76" fill="#8895c8" font-size="11" text-anchor="middle">&#946; (Nusakan)</text>

  <!-- Alphecca -->
  <circle cx="295" cy="90" r="5.5" fill="#eaf0ff" filter="url(#g2)"/>
  <text x="305" y="82" fill="#dbe4ff" font-size="13" font-weight="bold">Alphecca (&#945;)</text>
  <text x="305" y="98" fill="#9aa6d8" font-size="10">mag 2.2 — brightest in the Crown</text>

  <!-- epsilon CrB -->
  <circle cx="332" cy="228" r="3" fill="#c6d3ff"/>
  <text x="344" y="224" fill="#9aa6d8" font-size="11">&#949; CrB (mag 4.1)</text>

  <!-- T CrB -->
  <g filter="url(#g2)">
    <circle cx="372" cy="262" r="6" fill="#ffd24a"/>
    <circle cx="372" cy="262" r="2.6" fill="#ff5a4a"/>
  </g>
  <line x1="378" y1="266" x2="430" y2="300" stroke="#ffd24a" stroke-width="1"/>
  <text x="435" y="298" fill="#ffe08a" font-size="13" font-weight="bold">T CrB (Blaze Star)</text>
  <text x="435" y="314" fill="#c9b063" font-size="10.5">~1° from &#949; CrB · ~5.5° from Alphecca</text>
  <text x="435" y="329" fill="#c9b063" font-size="10.5">erupts to ~mag 2 (≈ Alphecca)</text>

  <!-- scale bar ~5 deg -->
  <g>
    <line x1="380" y1="52" x2="500" y2="52" stroke="#8593c8" stroke-width="1.4"/>
    <line x1="380" y1="47" x2="380" y2="57" stroke="#8593c8" stroke-width="1.4"/>
    <line x1="500" y1="47" x2="500" y2="57" stroke="#8593c8" stroke-width="1.4"/>
    <text x="440" y="44" fill="#9aa6d8" font-size="10.5" text-anchor="middle">~5°  ≈ 3 finger-widths at arm's length</text>
  </g>
</svg>
