<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Geneva, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1330"/><stop offset="100%" stop-color="#05060f"/>
    </linearGradient>
    <filter id="gl" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="720" height="470" fill="url(#bg)"/>
  <text x="360" y="30" text-anchor="middle" fill="#e9eeff" font-size="19" font-weight="bold">T CrB — expected light curve</text>
  <text x="360" y="48" text-anchor="middle" fill="#93a0d4" font-size="12">shape based on the 1946 eruption · brighter is up · time on a log scale</text>

  <!-- naked-eye window shading (approx day 0.3 to day 8) -->
  <rect x="106" y="50" width="295" height="340" fill="#ffd36a" opacity="0.06"/>
  <text x="253" y="66" text-anchor="middle" fill="#e2c05a" font-size="11.5" font-weight="bold">naked-eye window · about a week</text>

  <!-- axes -->
  <line x1="70" y1="50" x2="70" y2="390" stroke="#4a5578" stroke-width="1.2"/>
  <line x1="70" y1="390" x2="690" y2="390" stroke="#4a5578" stroke-width="1.2"/>

  <!-- y gridlines + labels (mag 2..12) -->
  <g font-size="11" fill="#8593c8">
    <line x1="70" y1="80.9"  x2="690" y2="80.9"  stroke="#20294a"/><text x="62" y="85"  text-anchor="end">2</text>
    <line x1="70" y1="142.7" x2="690" y2="142.7" stroke="#20294a"/><text x="62" y="147" text-anchor="end">4</text>
    <line x1="70" y1="204.5" x2="690" y2="204.5" stroke="#20294a"/><text x="62" y="209" text-anchor="end">6</text>
    <line x1="70" y1="266.4" x2="690" y2="266.4" stroke="#20294a"/><text x="62" y="271" text-anchor="end">8</text>
    <line x1="70" y1="328.2" x2="690" y2="328.2" stroke="#20294a"/><text x="62" y="333" text-anchor="end">10</text>
    <text x="62" y="389" text-anchor="end">12</text>
  </g>
  <text x="24" y="220" fill="#aeb9e8" font-size="12" transform="rotate(-90 24 220)" text-anchor="middle">Brightness (magnitude)</text>

  <!-- naked-eye limit line at mag 6 -->
  <line x1="70" y1="204.5" x2="690" y2="204.5" stroke="#ffcf5c" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.8"/>
  <text x="686" y="199" text-anchor="end" fill="#e2c05a" font-size="11">naked-eye limit (~mag 6)</text>

  <!-- x ticks (log days) -->
  <g font-size="11" fill="#8593c8" text-anchor="middle">
    <line x1="214.5" y1="390" x2="214.5" y2="395" stroke="#4a5578"/><text x="214.5" y="409">1</text>
    <line x1="276.7" y1="390" x2="276.7" y2="395" stroke="#4a5578"/><text x="276.7" y="409">2</text>
    <line x1="358.9" y1="390" x2="358.9" y2="395" stroke="#4a5578"/><text x="358.9" y="409">5</text>
    <line x1="421.1" y1="390" x2="421.1" y2="395" stroke="#4a5578"/><text x="421.1" y="409">10</text>
    <line x1="483.3" y1="390" x2="483.3" y2="395" stroke="#4a5578"/><text x="483.3" y="409">20</text>
    <line x1="565.6" y1="390" x2="565.6" y2="395" stroke="#4a5578"/><text x="565.6" y="409">50</text>
    <line x1="627.8" y1="390" x2="627.8" y2="395" stroke="#4a5578"/><text x="627.8" y="409">100</text>
  </g>
  <text x="380" y="429" fill="#aeb9e8" font-size="12" text-anchor="middle">Days after eruption</text>

  <!-- light curve -->
  <polyline fill="none" stroke="#cfe0ff" stroke-width="2.4"
    points="70,328.2 106.4,204.5 168.6,112.7 205,80.9 276.7,118.9 338.9,142.7 375.3,173.6 401.1,204.5 429.6,235.5 451.3,260.2 483.3,281.8 545.6,312.7 582,343.6 618.4,374.5 636.4,266.4 664.2,328.2"/>

  <!-- key points -->
  <circle cx="205" cy="80.9" r="6" fill="#ff6a4d" filter="url(#gl)"/>
  <text x="212" y="76" fill="#ffd9cf" font-size="12" font-weight="bold">Peak ~mag 2 (like Polaris)</text>
  <text x="212" y="91" fill="#c99" font-size="10.5">reached within ~a day · lasts only hours</text>

  <circle cx="70" cy="328.2" r="3.4" fill="#9aa6d8"/>
  <text x="78" y="345" fill="#9aa6d8" font-size="10.5">quiescent ~mag 10</text>

  <circle cx="338.9" cy="142.7" r="3.4" fill="#e6ecff"/>
  <text x="345" y="139" fill="#9aa6d8" font-size="10">−2 mag by ~day 4</text>

  <circle cx="401.1" cy="204.5" r="4" fill="#ffd24a"/>
  <text x="408" y="220" fill="#e2c05a" font-size="10.5">fades from naked eye ~day 8</text>

  <!-- secondary max -->
  <circle cx="636.4" cy="266.4" r="4.6" fill="#bcd2ff" filter="url(#gl)"/>
  <text x="632" y="252" text-anchor="end" fill="#c7d2f5" font-size="11" font-weight="bold">secondary rise ~mag 8</text>
  <text x="632" y="238" text-anchor="end" fill="#8b97c8" font-size="10">~3 months later · binoculars</text>

  <text x="360" y="458" text-anchor="middle" fill="#55608c" font-size="10">Illustrative — actual 2026/27 peak magnitude and fade rate may differ from 1946.</text>
</svg>
